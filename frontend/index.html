<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#0f172a" />
    <title>CodeTutor AI — Learn to code with an AI tutor</title>
