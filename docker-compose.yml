services:
  # One-shot "service" whose only job is to build the polyglot runner image
  # that the backend will spawn per-session. It exits immediately; the backend
  # waits for it via service_completed_successfully.
  runner-image:
    image: ${RUNNER_IMAGE:-codetutor-ai-runner:latest}
    build:
      context: ./runner-image
    command: ["true"]

  # Constrained-API mirror of the cloud IAM pattern: the backend never sees
  # the raw Docker socket; it talks to this proxy, which enforces an allowlist
  # of endpoints. Drops the blast radius of backend RCE from "root on host"
  # to "can manage containers and exec in them." Map matches the API calls
  # LocalDockerBackend actually makes — see backends/localDocker.ts.
  socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    environment:
      CONTAINERS: "1"  # create/start/stop/inspect/remove + self-inspect
      EXEC: "1"        # exec create/start/inspect for runner commands
      IMAGES: "1"      # runner-image inspect in ensureReady()
      POST: "1"        # required for any non-GET request
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:2375/_ping"]
      interval: 5s
      timeout: 2s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    # 12-factor config: every value differs across dev / prod, all flowing
    # in via env. Docker compose loads `.env` by default; for prod swap with
    # `docker compose --env-file=.env.production up`. Required vars fail
    # fast at backend boot (assertConfigValid) rather than silently running
    # on dev-ish defaults — see backend/src/config.ts.
    environment:
      PORT: "${BACKEND_PORT:-4000}"
      CORS_ORIGIN: "${CORS_ORIGIN:-http://localhost:5173}"
      RUNNER_IMAGE: "${RUNNER_IMAGE:-codetutor-ai-runner:latest}"
      # Talk to the socket proxy instead of the raw Docker socket. dockerode
      # honors DOCKER_HOST; the proxy then enforces the allowlist above.
      DOCKER_HOST: "${DOCKER_HOST:-tcp://socket-proxy:2375}"
      # Backend-internal path for workspace I/O. Same on every host OS —
      # the host path is discovered at startup via Docker self-inspect.
      WORKSPACE_ROOT: "${WORKSPACE_ROOT:-/workspace-root}"
      # Rate-limits. config.ts defaults (30/120/60 per minute) are prod
      # posture; dev headroom below because the E2E suite hits from a
      # single 127.0.0.1 with parallel workers.
      SESSION_CREATE_RATE_LIMIT_MAX: "${SESSION_CREATE_RATE_LIMIT_MAX:-500}"
      MUTATION_RATE_LIMIT_MAX: "${MUTATION_RATE_LIMIT_MAX:-2000}"
      AI_RATE_LIMIT_MAX: "${AI_RATE_LIMIT_MAX:-500}"
      # Phase 20-P3: session caps. Empty default → config.ts fallback (2/20/8).
      # E2E CI overrides these to loose values because Playwright cycles test
      # pages faster than `pagehide`-driven session cleanup reaches the
      # backend, and a tight per-user cap blocks the next test for the full
      # sweeper interval. Prod stays on config.ts defaults (no env override
      # from cloud-init).
      MAX_SESSIONS_PER_USER: "${MAX_SESSIONS_PER_USER:-}"
      MAX_SESSIONS_GLOBAL: "${MAX_SESSIONS_GLOBAL:-}"
      DOCKER_EXEC_CONCURRENCY: "${DOCKER_EXEC_CONCURRENCY:-}"
      # Supabase — required. No default: failing fast beats pointing at the
      # wrong project. Populate .env from .env.example.
      SUPABASE_URL: "${SUPABASE_URL}"
      SUPABASE_SERVICE_ROLE_KEY: "${SUPABASE_SERVICE_ROLE_KEY}"
      DATABASE_URL: "${DATABASE_URL}"
      # Master key for encrypting per-user BYOK OpenAI keys at rest. 32-byte
      # base64; required — assertConfigValid() refuses to boot without it.
      BYOK_ENCRYPTION_KEY: "${BYOK_ENCRYPTION_KEY}"
      # Phase 20-P3: optional bearer for /api/metrics. When blank the
      # endpoint is loopback-only (fine for dev — a direct fetch from the
      # host goes through the docker bridge so req.ip is non-loopback and
      # is blocked; inside-container scraping still works). When set, the
      # endpoint accepts `Authorization: Bearer <token>`. E2E sets it so
      # metrics.spec can exercise the authed path.
      METRICS_TOKEN: "${METRICS_TOKEN:-}"
    volumes:
      # Relative path — Compose resolves it against the compose file location
      # on every host. Works in PowerShell, zsh, bash identically.
      - ${WORKSPACE_HOST_PATH:-./temp/sessions}:/workspace-root
    ports:
      # Default loopback-only bind for local dev. Prod deploys override
      # BACKEND_BIND to an interface reachable by their ingress (or drop
      # the port publish entirely and use an overlay network).
      - "${BACKEND_BIND:-127.0.0.1}:${BACKEND_PORT:-4000}:${BACKEND_PORT:-4000}"
    depends_on:
      runner-image:
        condition: service_completed_successfully
      socket-proxy:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      # `dev` (default) runs Vite's dev server for hot reload during local
      # compose; `prod` builds a static bundle served by nginx. Prod deploys
      # set FRONTEND_BUILD_TARGET=prod in their env file.
      target: ${FRONTEND_BUILD_TARGET:-dev}
      # VITE_* values are inlined into the bundle by `vite build` (prod stage
      # only). For `dev`, Vite reads frontend/.env.development natively at
      # runtime — no compose-level environment overrides needed, and we
      # explicitly avoid them because empty-string overrides would crowd out
      # the file loader. For prod, CI / `.env.production` provides real
      # values via env-var interpolation below.
      args:
        VITE_BACKEND_URL: "${VITE_BACKEND_URL:-http://backend:4000}"
        VITE_SUPABASE_URL: "${VITE_SUPABASE_URL}"
        VITE_SUPABASE_ANON_KEY: "${VITE_SUPABASE_ANON_KEY}"
        VITE_APP_SHA: "${VITE_APP_SHA:-dev}"
    # VITE_* are read by vite.config.ts at dev-server startup (for vite.config
    # itself) and injected into import.meta.env for the browser bundle. In dev
    # mode Vite picks up any VITE_* process env var, so we surface the three
    # required values here. They flow from the compose `.env` file, which is
    # the single source of truth for dev — see docs/DEVELOPMENT.md.
    environment:
      VITE_BACKEND_URL: "${VITE_BACKEND_URL:-http://backend:4000}"
      VITE_SUPABASE_URL: "${VITE_SUPABASE_URL}"
      VITE_SUPABASE_ANON_KEY: "${VITE_SUPABASE_ANON_KEY}"
    ports:
      # Default loopback-only. Prod deploys override FRONTEND_BIND.
      - "${FRONTEND_BIND:-127.0.0.1}:${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend
