services:
  # One-shot "service" whose only job is to build the polyglot runner image
  # that the backend will spawn per-session. It exits immediately; the backend
  # waits for it via service_completed_successfully.
  runner-image:
    image: ${RUNNER_IMAGE:-codetutor-ai-runner:latest}
    build:
      context: ./runner-image
    command: ["true"]

  # Constrained-API mirror of the cloud IAM pattern: the backend never sees
  # the raw Docker socket; it talks to this proxy, which enforces an allowlist
  # of endpoints. Drops the blast radius of backend RCE from "root on host"
  # to "can manage containers and exec in them." Map matches the API calls
  # LocalDockerBackend actually makes — see backends/localDocker.ts.
  socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    environment:
      CONTAINERS: "1"  # create/start/stop/inspect/remove + self-inspect
      EXEC: "1"        # exec create/start/inspect for runner commands
      IMAGES: "1"      # runner-image inspect in ensureReady()
      POST: "1"        # required for any non-GET request
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:2375/_ping"]
      interval: 5s
      timeout: 2s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    # Everything below is 12-factor config: every value differs potentially
    # across dev / staging / prod, so it all flows in via env (with dev-
    # friendly defaults baked in via ${VAR:-default}). Same image, different
    # env file = different environment. `docker compose up` works with no
    # env file; `docker compose --env-file=.env.production up` swaps it.
    environment:
      PORT: "${BACKEND_PORT:-4000}"
      CORS_ORIGIN: "${CORS_ORIGIN:-http://localhost:5173}"
      RUNNER_IMAGE: "${RUNNER_IMAGE:-codetutor-ai-runner:latest}"
      # Talk to the socket proxy instead of the raw Docker socket. dockerode
      # honors DOCKER_HOST; the proxy then enforces the allowlist above.
      DOCKER_HOST: "${DOCKER_HOST:-tcp://socket-proxy:2375}"
      # Backend-internal path for workspace I/O. Same on every host OS —
      # the host path is discovered at startup via Docker self-inspect and
      # used separately when spawning sibling containers. See
      # backend/src/services/execution/backends/localDocker.ts → resolveHostWorkspaceRoot.
      WORKSPACE_ROOT: "${WORKSPACE_ROOT:-/workspace-root}"
      # Rate-limits. The config.ts defaults (30 session-creates, 120
      # mutations, 60 AI calls per minute per IP/user) are the production
      # posture. Local compose — and especially the E2E suite, which hits
      # the backend from a single 127.0.0.1 with parallel workers — needs a
      # lot more headroom. Dev defaults below are generous; unit tests cover
      # the actual 429 behavior. Override via env in prod.
      SESSION_CREATE_RATE_LIMIT_MAX: "${SESSION_CREATE_RATE_LIMIT_MAX:-500}"
      MUTATION_RATE_LIMIT_MAX: "${MUTATION_RATE_LIMIT_MAX:-2000}"
      AI_RATE_LIMIT_MAX: "${AI_RATE_LIMIT_MAX:-500}"
      # Phase 18a. Backend-in-container reaches the host-run Supabase stack
      # via host.docker.internal (resolved below on Linux via extra_hosts).
      # Auth tokens are verified via the auth server's JWKS endpoint; we do
      # not share any secret with Supabase. Override for prod with the cloud
      # project URL (`https://<ref>.supabase.co`).
      SUPABASE_URL: "${SUPABASE_URL:-http://host.docker.internal:54321}"
      # Issuer claim on access tokens. In local dev the browser reaches
      # Supabase at 127.0.0.1 and GoTrue signs tokens with that URL in `iss`,
      # while the backend reaches Supabase via host.docker.internal. These
      # two differ, so we set an explicit override here. For cloud prod the
      # SUPABASE_URL and token-issuer host match — leave this unset there.
      SUPABASE_AUTH_ISSUER: "${SUPABASE_AUTH_ISSUER:-http://127.0.0.1:54321/auth/v1}"
      # Phase 18b. Per-user state (preferences, progress, editor project) lives
      # in the same Supabase Postgres that `supabase start` provisions locally.
      # The CLI exposes it on host port 54322; from inside the backend container
      # we reach it via host.docker.internal. Override for prod with the cloud
      # project's direct connection string (Project Settings → Database).
      DATABASE_URL: "${DATABASE_URL:-postgresql://postgres:postgres@host.docker.internal:54322/postgres}"
    extra_hosts:
      # Linux doesn't resolve host.docker.internal out of the box the way
      # macOS/Windows do. This entry makes the backend reach the host-run
      # Supabase identically across OSes.
      - "host.docker.internal:host-gateway"
    volumes:
      # Relative path — Compose resolves it against the compose file location
      # on every host. Works in PowerShell, zsh, bash identically.
      - ${WORKSPACE_HOST_PATH:-./temp/sessions}:/workspace-root
    ports:
      # Default loopback-only bind for local dev. Prod deploys override
      # BACKEND_BIND to an interface reachable by their ingress (or drop
      # the port publish entirely and use an overlay network).
      - "${BACKEND_BIND:-127.0.0.1}:${BACKEND_PORT:-4000}:${BACKEND_PORT:-4000}"
    depends_on:
      runner-image:
        condition: service_completed_successfully
      socket-proxy:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      # `dev` (default) runs Vite's dev server for hot reload during local
      # compose; `prod` builds a static bundle served by nginx. Prod deploys
      # set FRONTEND_BUILD_TARGET=prod in their env file.
      target: ${FRONTEND_BUILD_TARGET:-dev}
      # VITE_* values are inlined into the bundle by `vite build` (prod stage
      # only). For `dev`, Vite reads frontend/.env.development natively at
      # runtime — no compose-level environment overrides needed, and we
      # explicitly avoid them because empty-string overrides would crowd out
      # the file loader. For prod, CI / `.env.production` provides real
      # values via env-var interpolation below.
      args:
        VITE_BACKEND_URL: "${VITE_BACKEND_URL:-http://backend:4000}"
        VITE_SUPABASE_URL: "${VITE_SUPABASE_URL:-http://127.0.0.1:54321}"
        VITE_SUPABASE_ANON_KEY: "${VITE_SUPABASE_ANON_KEY:-}"
    # VITE_BACKEND_URL is read by vite.config.ts (Node side) at dev-server
    # startup to configure the /api proxy, so it has to be a runtime env var
    # on the dev container — build args only help the prod build stage.
    # VITE_SUPABASE_* are read at browser runtime from frontend/.env.development
    # by Vite's native loader, so they don't need to be here.
    environment:
      VITE_BACKEND_URL: "${VITE_BACKEND_URL:-http://backend:4000}"
    ports:
      # Default loopback-only. Prod deploys override FRONTEND_BIND.
      - "${FRONTEND_BIND:-127.0.0.1}:${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend
