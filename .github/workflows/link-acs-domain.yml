name: Link ACS email domain (one-shot)

# One-shot workflow_dispatch to relink the verified mail domain to the
# Communication Service after a Bicep deploy stripped `linkedDomains`.
# Auths via OIDC (codetutor-ai-gh-deploy SP, Contributor on prod RG) so it
# bypasses the user-account MFA gate. Delete this workflow once the Bicep
# default is patched to pass linkDomain=true.

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  link:
    runs-on: ubuntu-latest
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Link mail.codetutor.msrivas.com to codetutor-ai-acs
        run: |
          set -e
          DOMAIN_ID=$(az communication email domain show \
            --domain-name 'mail.codetutor.msrivas.com' \
            --email-service-name codetutor-ai-email \
            --resource-group codetutor-ai-prod-rg \
            --query "id" -o tsv)
          echo "Domain ID: $DOMAIN_ID"
          az communication update \
            --name codetutor-ai-acs \
            --resource-group codetutor-ai-prod-rg \
            --set "linkedDomains=['$DOMAIN_ID']"
          echo "Verifying linkedDomains..."
          az communication show \
            --name codetutor-ai-acs \
            --resource-group codetutor-ai-prod-rg \
            --query "linkedDomains" -o json
