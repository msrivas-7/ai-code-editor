#cloud-config
# First-boot VM bootstrap. Installs Docker + Azure CLI, clones the repo,
# pulls secrets from Key Vault via the VM's managed identity, builds the
# compose images (locally until Phase 19c publishes to GHCR), and hands
# long-running lifecycle to a systemd unit.
#
# Templated at deploy time by main.bicep:
#   {{KV_NAME}}       — Key Vault name to read secrets from
#   {{VM_FQDN}}       — Caddy cert hostname
#   {{SWA_HOSTNAME}}  — set as backend CORS_ORIGIN
#   {{REPO_URL}}      — public repo to clone (no auth needed)
#   {{BACKEND_IMAGE}} — GHCR tag the backend service pulls (post-19c)
#   {{RUNNER_IMAGE}}  — GHCR tag for the runner image
#   {{ADMIN_EMAIL}}   — LE registration address + Caddy contact

package_update: true
package_upgrade: false

packages:
  - ca-certificates
  - curl
  - gnupg
  - git
  - jq
  - unattended-upgrades

write_files:
  # Refresh /opt/codetutor/.env from Key Vault. Runs at boot (ExecStartPre)
  # and daily (timer) so rotated secrets land without manual SSH. Atomic
  # swap via mktemp + mv so a partial write never reaches the service.
  - path: /usr/local/bin/refresh-env
    permissions: '0755'
    owner: root:root
    content: |
      #!/bin/bash
      set -euo pipefail

      KV_NAME="{{KV_NAME}}"
      ENV_FILE=/opt/codetutor/.env
      COMPOSE_DIR=/opt/codetutor
      TMP=$(mktemp)
      chmod 0600 "$TMP"

      # Managed-identity login. --allow-no-subscriptions: the VM MI has no
      # subscription-level role, only KV secret reads, so skip sub hydrate.
      az login --identity --allow-no-subscriptions >/dev/null

      fetch() {
        az keyvault secret show --vault-name "$KV_NAME" --name "$1" \
          --query value -o tsv
      }

      # Soft variant for secrets that are optional in prod — returns empty
      # string when the KV secret doesn't exist, so refresh-env doesn't fail
      # under `set -e`. Backend treats empty string as "not configured".
      fetch_optional() {
        az keyvault secret show --vault-name "$KV_NAME" --name "$1" \
          --query value -o tsv 2>/dev/null || echo ""
      }

      # No heredocs — YAML indent-stripping would break the closing delimiter.
      # Plain echoes into a grouped redirect keep this robust.
      {
        echo "SUPABASE_URL=$(fetch SUPABASE-URL)"
        echo "SUPABASE_SERVICE_ROLE_KEY=$(fetch SUPABASE-SERVICE-ROLE-KEY)"
        echo "DATABASE_URL=$(fetch DATABASE-URL)"
        echo "BYOK_ENCRYPTION_KEY=$(fetch BYOK-ENCRYPTION-KEY)"
        echo "VITE_SUPABASE_URL=$(fetch VITE-SUPABASE-URL)"
        echo "VITE_SUPABASE_ANON_KEY=$(fetch VITE-SUPABASE-ANON-KEY)"
        # Optional: METRICS-TOKEN gates /api/metrics. When absent from KV
        # the endpoint is loopback-only (fine for prod today — no external
        # scraper). Seed it in KV when wiring in Prometheus.
        echo "METRICS_TOKEN=$(fetch_optional METRICS-TOKEN)"
        # Phase 20-P4: Free AI tier. All six are fetched as optional so a
        # first boot without these KV secrets (older envs, or a rebuild
        # before P4 ships) still comes up cleanly — absent values just mean
        # free tier stays off. assertConfigValid only requires the OpenAI
        # key when ENABLE_FREE_TIER=1. To flip the feature on: rotate the
        # ENABLE-FREE-TIER secret to "1" and re-run refresh-env.
        echo "ENABLE_FREE_TIER=$(fetch_optional ENABLE-FREE-TIER)"
        echo "FREE_TIER_DAILY_QUESTIONS=$(fetch_optional FREE-TIER-DAILY-QUESTIONS)"
        echo "FREE_TIER_DAILY_USD_PER_USER=$(fetch_optional FREE-TIER-DAILY-USD-PER-USER)"
        echo "FREE_TIER_LIFETIME_USD_PER_USER=$(fetch_optional FREE-TIER-LIFETIME-USD-PER-USER)"
        echo "FREE_TIER_DAILY_USD_CAP=$(fetch_optional FREE-TIER-DAILY-USD-CAP)"
        echo "PLATFORM_OPENAI_API_KEY=$(fetch_optional PLATFORM-OPENAI-API-KEY)"
        # Non-secret prod config. CORS locked to the canonical custom
        # domain (shadowed by docker-compose.prod.yml's backend env block);
        # rate limits back to prod-tight values (dev's 500/2000/500 headroom
        # was for the parallel e2e workers, not real traffic).
        echo "BACKEND_PORT=4000"
        echo "BACKEND_BIND=127.0.0.1"
        echo "CORS_ORIGIN=https://codetutor.msrivas.com"
        echo "BACKEND_IMAGE={{BACKEND_IMAGE}}"
        echo "RUNNER_IMAGE={{RUNNER_IMAGE}}"
        echo "DOCKER_HOST=tcp://socket-proxy:2375"
        echo "WORKSPACE_ROOT=/workspace-root"
        echo "WORKSPACE_HOST_PATH=/opt/codetutor/temp/sessions"
        echo "SESSION_CREATE_RATE_LIMIT_MAX=30"
        echo "MUTATION_RATE_LIMIT_MAX=120"
        echo "AI_RATE_LIMIT_MAX=60"
        echo "VM_FQDN={{VM_FQDN}}"
        echo "ADMIN_EMAIL={{ADMIN_EMAIL}}"
      } > "$TMP"

      chown codetutor:codetutor "$TMP"

      # Phase 20-P3: detect env changes and force-recreate the backend when
      # something rotated. Docker compose `up -d` (without --force-recreate)
      # is a no-op for containers whose compose-level config is unchanged —
      # .env var diffs don't trigger a restart on their own. Without this,
      # rotating BYOK_ENCRYPTION_KEY in Key Vault would silently do nothing
      # until a VM reboot, and the next boot's freshly-recreated container
      # would come up with the new master key → every stored ciphertext
      # suddenly undecryptable. Force-recreate on change closes that gap.
      #
      # Only fires when the backend is already running (codetutor-ai.service
      # up). During first boot the containers don't exist yet; the main
      # compose-up in codetutor-ai.service will pick up the fresh env
      # directly — no need to recreate anything.
      old_hash=""
      if [ -f "$ENV_FILE" ]; then
        old_hash=$(sha256sum "$ENV_FILE" | awk '{print $1}')
      fi
      new_hash=$(sha256sum "$TMP" | awk '{print $1}')

      mv "$TMP" "$ENV_FILE"

      if [ "$old_hash" != "$new_hash" ] && [ -n "$old_hash" ]; then
        echo "[refresh-env] env changed (old=${old_hash:0:8} new=${new_hash:0:8})"
        # Only recreate if the stack is actually up — if this runs during a
        # shutdown window, skip and let the next main-service start handle it.
        if sudo -u codetutor docker compose \
          -f "$COMPOSE_DIR/docker-compose.yml" \
          -f "$COMPOSE_DIR/docker-compose.prod.yml" \
          --env-file "$ENV_FILE" ps --status running --quiet backend | grep -q .; then
          echo "[refresh-env] force-recreating backend to pick up new env"
          sudo -u codetutor docker compose \
            -f "$COMPOSE_DIR/docker-compose.yml" \
            -f "$COMPOSE_DIR/docker-compose.prod.yml" \
            --env-file "$ENV_FILE" up -d --force-recreate --no-deps backend
        else
          echo "[refresh-env] backend not running; skipping recreate"
        fi
      else
        echo "[refresh-env] env unchanged (hash=${new_hash:0:8})"
      fi

  - path: /etc/systemd/system/codetutor-ai.service
    permissions: '0644'
    owner: root:root
    content: |
      [Unit]
      Description=CodeTutor AI backend stack
      Requires=docker.service
      After=docker.service network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      User=codetutor
      Group=codetutor
      WorkingDirectory=/opt/codetutor
      # Re-pull secrets on every start — covers rotation + first boot.
      ExecStartPre=/usr/local/bin/refresh-env
      ExecStart=/usr/bin/docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env up
      ExecStop=/usr/bin/docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env down
      Restart=on-failure
      RestartSec=30
      # First boot downloads images / builds locally, so allow plenty of time.
      TimeoutStartSec=900

      [Install]
      WantedBy=multi-user.target

  - path: /etc/systemd/system/codetutor-ai-refresh-env.service
    permissions: '0644'
    owner: root:root
    content: |
      [Unit]
      Description=Refresh CodeTutor .env from Key Vault (idempotent)

      [Service]
      Type=oneshot
      User=codetutor
      Group=codetutor
      WorkingDirectory=/opt/codetutor
      ExecStart=/usr/local/bin/refresh-env
      # `up -d` is a no-op if env is unchanged; restarts the affected
      # services if any value rotated.
      ExecStartPost=/usr/bin/docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env up -d

  - path: /etc/systemd/system/codetutor-ai-refresh-env.timer
    permissions: '0644'
    owner: root:root
    content: |
      [Unit]
      Description=Daily refresh of CodeTutor .env from Key Vault

      [Timer]
      OnCalendar=daily
      RandomizedDelaySec=1h
      Persistent=true

      [Install]
      WantedBy=timers.target

  # Hourly sweep of stale session workspaces. Startup purge in the backend
  # handles orphans across restarts, but steady-state growth between restarts
  # can still fill the 32 GB root disk if a burst of sessions doesn't exit
  # cleanly. 2 h threshold is longer than any realistic lesson dwell — running
  # sessions keep touching their dir via the runner mount, so mtime stays
  # fresh and they're not caught by this sweep.
  - path: /etc/systemd/system/codetutor-session-cleanup.service
    permissions: '0644'
    owner: root:root
    content: |
      [Unit]
      Description=Prune stale CodeTutor session workspaces
      ConditionPathIsDirectory=/opt/codetutor/temp/sessions

      [Service]
      Type=oneshot
      ExecStart=/usr/bin/find /opt/codetutor/temp/sessions -mindepth 1 -maxdepth 1 -type d -mmin +120 -exec rm -rf {} +

  - path: /etc/systemd/system/codetutor-session-cleanup.timer
    permissions: '0644'
    owner: root:root
    content: |
      [Unit]
      Description=Hourly prune of stale CodeTutor session workspaces

      [Timer]
      OnBootSec=15min
      OnUnitActiveSec=1h
      Persistent=true

      [Install]
      WantedBy=timers.target

  # Auto-reboot after unattended-upgrades lands a kernel/security update.
  # Ubuntu's default installs but doesn't reboot, so CVEs sit unarmed until
  # a manual bounce. 03:00 UTC is the lowest-traffic window for a learner
  # product. systemd restart policy on codetutor-ai.service brings the stack
  # back up; Caddy on restart reconstitutes the LE cert from /etc/caddy.
  - path: /etc/apt/apt.conf.d/52unattended-upgrades-reboot
    permissions: '0644'
    owner: root:root
    content: |
      Unattended-Upgrade::Automatic-Reboot "true";
      Unattended-Upgrade::Automatic-Reboot-WithUsers "true";
      Unattended-Upgrade::Automatic-Reboot-Time "03:00";

runcmd:
  # --- 2 GB swap file ---
  # B2s ships with no swap, so a single memory spike (e.g. an OOM'ing runner
  # image build or a coincident backend + frontend dev image pull) goes
  # straight to the OOM killer. 2 GB is enough headroom to survive bursts
  # without turning the VM into a swap-thrashing toy; swappiness=10 keeps
  # the kernel preferring to reclaim page cache over swapping anon pages.
  - |
    if [ ! -f /swapfile ]; then
      fallocate -l 2G /swapfile
      chmod 600 /swapfile
      mkswap /swapfile
      swapon /swapfile
      echo '/swapfile none swap sw 0 0' >> /etc/fstab
    fi
  - echo 'vm.swappiness=10' > /etc/sysctl.d/99-codetutor.conf
  - sysctl --system

  # Wait for any in-progress apt/dpkg operation to release its lock. Ubuntu's
  # apt-daily.service systemd timer fires on boot and can race runcmd here,
  # producing "Could not get lock /var/lib/dpkg/lock-frontend" and a silently
  # failed azure-cli install. Poll the two lock paths until both are free.
  - |
    for i in $(seq 1 120); do
      if ! fuser /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock >/dev/null 2>&1; then
        break
      fi
      echo "waiting for apt lock (attempt $i/120)..."
      sleep 5
    done

  # --- Docker CE from Docker's apt repo ---
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  - chmod a+r /etc/apt/keyrings/docker.gpg
  - |
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu noble stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update
  - DEBIAN_FRONTEND=noninteractive apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

  # --- Azure CLI (Microsoft apt repo) ---
  # Re-wait for lock in case apt-daily fired again between the docker install
  # above and now. The install script runs apt internally and won't retry.
  - |
    for i in $(seq 1 120); do
      if ! fuser /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock >/dev/null 2>&1; then
        break
      fi
      echo "waiting for apt lock before az-cli install (attempt $i/120)..."
      sleep 5
    done
  - curl -sL https://aka.ms/InstallAzureCLIDeb | bash

  # --- App user setup ---
  - usermod -aG docker codetutor
  - install -o codetutor -g codetutor -m 0755 -d /opt/codetutor
  - sudo -u codetutor git clone {{REPO_URL}} /opt/codetutor
  - install -o codetutor -g codetutor -m 0755 -d /opt/codetutor/temp/sessions

  # --- Populate .env from KV before anything starts ---
  - /usr/local/bin/refresh-env

  # --- Pre-build images so first `compose up` doesn't block on network ---
  # Once 19c publishes to GHCR this becomes a pull-through cache warm-up.
  - cd /opt/codetutor && sudo -u codetutor docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env build backend runner-image

  # --- Enable systemd lifecycle ---
  - systemctl daemon-reload
  - systemctl enable --now codetutor-ai.service
  - systemctl enable --now codetutor-ai-refresh-env.timer
  - systemctl enable --now codetutor-session-cleanup.timer

  # --- Security: auto-apply Ubuntu security patches (reboots at 03:00 if needed) ---
  - dpkg-reconfigure -f noninteractive unattended-upgrades

final_message: "codetutor-ai-vm cloud-init complete in $UPTIME seconds"
